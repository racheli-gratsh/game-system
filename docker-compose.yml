version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: game_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     game_user
      POSTGRES_PASSWORD: game_pass
      POSTGRES_DB:       game_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_user -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Node.js App ──────────────────────────────────────────────
  app:
    build: .
    container_name: game_app
    depends_on:
      db:
        condition: service_healthy   # waits until DB is truly ready
    environment:
      DATABASE_URL: "postgresql://game_user:game_pass@db:5432/game_db?schema=public"
    restart: "no"                    # run once and exit cleanly
